syntax = "proto3";

package gamepb.activitypb;

import "corepb.proto";

// ============ 活动服务 ============

// --- 获取活动列表 ---
message ActivityItem {
    int64 activity_id = 1;
    // field 2 可能已废弃
    int32 status = 3;
    string name = 4;           // 从 field 2 移到 field 4
    bytes extra = 5;           // 新增字段 (未知结构)
    int64 begin_time = 6;      // 从 field 4 移到 field 6
    int64 end_time = 7;        // 从 field 5 移到 field 7
    int32 type = 8;            // 从 field 6 移到 field 8
    int32 group_id = 9;        // 保持不变
    int32 sort_order = 10;     // 从 field 8 移到 field 10
}

message ListRequest {}

message ListReply {
    repeated ActivityItem activities = 1;
}

// --- 获取活动组 ---
message ActivityGroup {
    int64 group_id = 1;
    string name = 2;
    repeated ActivityItem activities = 3;
}

message GetGroupRequest {
    int64 group_id = 1;
}

message GetGroupReply {
    ActivityGroup group = 1;
}

// --- 活动操作 (参与/领取奖励) ---
message OperateRequest {
    int64 activity_id = 1;
    int32 operate_type = 2;     // 操作类型
    int64 param = 3;            // 附加参数
}

message OperateReply {
    repeated corepb.Item items = 1;  // 奖励物品
    int32 result = 2;
}

// --- 活动变更通知 ---
message ActiviesChangeNotify {
    repeated ActivityItem activities = 1;
}
