syntax = "proto3";

package gamepb.activitypb;

import "corepb.proto";

// ============ 活动服务 ============

// --- 获取活动列表 ---
message ActivityItem {
    int64 activity_id = 1;
    string name = 2;
    int32 status = 3;           // 活动状态
    int64 begin_time = 4;
    int64 end_time = 5;
    int32 type = 6;
    string icon_url = 7;
    int32 sort_order = 8;
    int32 group_id = 9;
}

message ListRequest {}

message ListReply {
    repeated ActivityItem activities = 1;
}

// --- 获取活动组 ---
message ActivityGroup {
    int64 group_id = 1;
    string name = 2;
    repeated ActivityItem activities = 3;
}

message GetGroupRequest {
    int64 group_id = 1;
}

message GetGroupReply {
    ActivityGroup group = 1;
}

// --- 活动操作 (参与/领取奖励) ---
message OperateRequest {
    int64 activity_id = 1;
    int32 operate_type = 2;     // 操作类型
    int64 param = 3;            // 附加参数
}

message OperateReply {
    repeated corepb.Item items = 1;  // 奖励物品
    int32 result = 2;
}

// --- 活动变更通知 ---
message ActiviesChangeNotify {
    repeated ActivityItem activities = 1;
}
